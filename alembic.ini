# Minimal Alembic configuration for CLI compatibility
# Logging is managed by the application's logger (uvicorn.error)

[alembic]
# path to migration scripts
script_location = cosmotech/example_api/migrations

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# version path separator
version_path_separator = os

# Database URL is set programmatically in env.py
# sqlalchemy.url is configured at runtime
